<html>
	<head>
		<title>Contact form</title>
		<link rel="stylesheet" href="style.css">
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1.0">
		<script src="https://use.fontawesome.com/d1341f9b7a.js"></script>
	</head>
	<body>
		<nav>
			<div class="navbar">
				<ul>
                <li><a href="#"><i class="fa fa-github" aria-hidden="true"> Github</i></a></li>
				<li><a href="#"><i class="fa fa-instagram" aria-hidden="true"> Instagram</i></a></li>
				<li><a href="#"><i class="fa fa-facebook" aria-hidden="true">Facebbok</i></a></li>
				<li><a href="#"><i class="fa fa-twitter" aria-hidden="true">Twitter</i></a></li>
				<li><a href="#"><i class="fa fa-google" aria-hidden="true"> Google</i></a></li>
				<li><a href="#"><i class="fa fa-envelope" aria-hidden="true"> Gmail</i></a></li>
			</ul>
            </div>
		</nav>
		<h2 class="contact"><u>Contact Us</u></h2>
		<div class="contact-box">
			<form>
				<input type="text" class="input-field" placeholder="Your Name">
				<input type="email" class="input-field" placeholder="Your Email">
				<input type="text" class="input-field" placeholder="Phone Number">
				<textarea type="text" class="input-field textarea-field" placeholder="Your Message"></textarea>
				<button type="button" class="btn">Send Message</button>
			</form>
		</div>
		<footer>Designed by <b><i>@contactform.com</i></b></footer>
	</body>
</html>
